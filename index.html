<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>منصة Animo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="logo-header">
    <img src="images/animo.jpg" alt="شعار Animo" class="logo-img">
  </header>

  <h1 class="main-title">منصة Animo لمشاهدة الأنمي</h1>

  <div class="anime-container">
  
    <div class="anime-box">
      <a href="anime.html?anime=InuYasha">
        <img src="images/InuYasha.jpg" alt="InuYasha">
        <h2>InuYasha</h2>
      </a>
    </div>

    <div class="anime-box">
      <a href="anime.html?anime=Boroto">
        <img src="images/Boroto.jpg" alt="Boroto">
        <h2>Boroto</h2>
      </a>
    </div>

    <div class="anime-box">
      <a href="anime.html?anime=Naruto">
        <img src="images/Naruto.jpg" alt="Naruto">
        <h2>Naruto</h2>
      </a>
    </div>

    <div class="anime-box">
      <a href="anime.html?anime=DragonBall">
        <img src="images/DragonBall.jpg" alt="DragonBall">
        <h2>DragonBall</h2>
      </a>
    </div>
  </div>

  <script src="links.js"></script>
  <script>
    
    const animeMap = {};
    links.forEach(url => {
      const match = url.match(/video-title=([^&]+)/);
      if (!match) return;
      const [animeName, epNum] = match[1].split('-');
      if (!animeMap[animeName]) animeMap[animeName] = [];
      animeMap[animeName].push({ episode: epNum, url });
    });
    window.animeMap = animeMap;
  </script>
</body>
</html>
