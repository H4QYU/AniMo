<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مشغل الحلقة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="logo-header">
    <a href="index.html">
      <img src="images/animo.jpg" alt="شعار Animo" class="logo-img">
    </a>
  </header>

  <h1 id="animeTitle">تحميل الحلقة...</h1>

  <a id="backBtn" class="back-btn" href="#">⬅ العودة للحلقات</a>

  <iframe id="animePlayer" width="100%" height="600px" frameborder="0" allowfullscreen></iframe>

  <script src="links.js"></script>
  <script>
    // إنشاء خريطة الأنمي والحلقات مباشرة
    const animeMap = {};
    links.forEach(url => {
      const match = url.match(/video-title=([^&]+)/);
      if (!match) return;
      const [animeName, epNum] = match[1].split('-');
      if (!animeMap[animeName]) animeMap[animeName] = [];
      animeMap[animeName].push({ episode: epNum, url });
    });

    const params = new URLSearchParams(window.location.search);
    const anime = params.get("anime");
    const epIndex = params.get("ep");
    const title = document.getElementById("animeTitle");
    const player = document.getElementById("animePlayer");
    const backBtn = document.getElementById("backBtn");

    if (animeMap[anime] && animeMap[anime][epIndex]) {
      const epObj = animeMap[anime][epIndex];
      player.src = epObj.url;
      title.textContent = `${anime} - الحلقة ${epObj.episode}`;
      backBtn.href = `anime.html?anime=${anime}`;
    } else {
      title.textContent = "الحلقة أو الأنمي غير موجود";
      player.style.display = "none";
      backBtn.style.display = "none";
    }
  </script>

</body>
</html>
